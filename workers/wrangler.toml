name = "stockai-api"
main = "src/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ── KV 네임스페이스 ─────────────────────────────────────────
# Yahoo Finance crumb 토큰 캐시, 차트 데이터 캐시
# 생성: wrangler kv:namespace create "CACHE"
[[kv_namespaces]]
binding = "CACHE"
id = "ccd6b1c20a86487ea45d4148dc11f13a"

# ── D1 데이터베이스 ─────────────────────────────────────────
# 푸시 구독자, 가격 알림 영구 저장
# 생성: wrangler d1 create stockai-db
[[d1_databases]]
binding = "DB"
database_name = "stockai-db"
database_id = "eb508a0a-95a0-4879-963c-dca0ae6eb350"

# ── 환경변수 (vars) ────────────────────────────────────────
# 공개 변수만 여기에. 시크릿(VAPID, Polygon API)은 wrangler secret 으로
[vars]
ENV = "production"

# ── Cron Triggers ────────────────────────────────────────
# 시장 시간에만 cron 발동 → 무료 한도 절약 + 알림 노이즈 ↓
#
# 미국 정규장: ET 09:30-16:00 = UTC 14:30-21:00 (서머타임 EDT 기준)
#              ET 09:30-16:00 = UTC 13:30-20:00 (겨울 EST 기준, 11월~3월)
#   → 보수적으로 UTC 13:00-21:30 (월~금) 적용 (양 시즌 + 프리/애프터마켓 일부)
#
# 한국 정규장: KST 09:00-15:30 = UTC 00:00-06:30 (월~금)
#
# 평일 KST 09시 (=UTC 00시) 실적 리마인더는 그대로 유지
#
# 일일 cron 횟수: 약 90회 (이전 288회 대비 67% 절약)
[triggers]
crons = [
  "*/5 13-21 * * 1-5",  # 미국 정규장 (UTC 13:00~21:55) — 5분마다 시그널 분석 + 가격 알림
  "*/5 0-6 * * 1-5",    # 한국 정규장 (UTC 00:00~06:55) — 5분마다 시그널 분석 + 가격 알림
  "0 0 * * 1-5",        # 평일 KST 09시 실적 리마인더
  "30 * * * *",         # 매시 :30 — 시그널 결과 매칭 (정확도 추적)
]

# ── 라우트 (커스텀 도메인 사용 시) ──────────────────────────
# 옵션: 도메인 구매 후 활성화. 지금은 *.workers.dev 사용.
